<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kişisel Muhasebe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F7F6F2;font-family:'DM Sans',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0;}
input::-webkit-inner-spin-button{-webkit-appearance:none;}
select{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:0;height:0;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#app{width:400px;max-width:100%;background:white;border-radius:28px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,0.08);position:relative;min-height:640px;display:flex;flex-direction:column;}

/* Header */
#header{padding:22px 20px 0;flex-shrink:0;}
#header .date{font-size:11px;color:#bbb;letter-spacing:1px;text-transform:uppercase;}
#header .title{font-size:22px;font-weight:700;color:#111;font-family:'DM Serif Display',serif;margin-top:3px;}
#dots{position:absolute;top:22px;right:20px;display:flex;gap:5px;}
.dot{height:6px;border-radius:3px;cursor:pointer;transition:all .3s;background:#ddd;}
.dot.active{width:16px;background:#222;}
.dot.inactive{width:6px;}

/* Content */
#content{flex:1;overflow-y:auto;padding-bottom:66px;}

/* Bottom nav */
#nav{position:absolute;bottom:0;left:0;right:0;height:60px;background:white;border-top:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-around;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:6px 20px;border-radius:14px;transition:all .2s;color:#bbb;font-family:'DM Sans',sans-serif;}
.nav-btn.active{color:#222;}
.nav-btn .icon{font-size:17px;transition:transform .2s;}
.nav-btn.active .icon{transform:scale(1.2);}
.nav-btn .lbl{font-size:10px;}
.nav-btn.active .lbl{font-weight:600;}

/* Ortak */
.card{padding:10px 12px;border-radius:12px;background:#fafafa;border:1.5px solid transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;}
.card.selected{background:#f0f0ec;}
.dot-color{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.panel{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;padding:20px 16px 24px;box-shadow:0 -8px 40px rgba(0,0,0,0.12);animation:slideUp .3s ease;z-index:10;}
.btn-primary{padding:8px;background:#222;color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;flex:1;}
.btn-secondary{padding:8px;background:#eee;color:#555;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;flex:1;}
.btn-danger{padding:7px;background:#fee;border:none;border-radius:9px;font-size:12px;cursor:pointer;color:#E76F51;font-family:'DM Sans',sans-serif;flex:1;}
.btn-close{background:#f4f4f4;border:none;border-radius:50%;width:30px;height:30px;font-size:17px;cursor:pointer;color:#555;display:flex;align-items:center;justify-content:center;}
.inp{font-size:13px;padding:8px 10px;border-radius:9px;border:1px solid #ddd;outline:none;font-family:'DM Sans',sans-serif;width:100%;}
.lbl-wrap{display:flex;flex-direction:column;gap:3px;}
.lbl-wrap span{font-size:10px;color:#aaa;}
.tag{font-size:10px;padding:1px 6px;border-radius:5px;background:#f0f0f0;color:#aaa;}
.dashed-btn{width:100%;padding:11px;border:1.5px dashed #ccc;border-radius:12px;background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;}

/* SVG Donut */
svg text{font-family:'DM Sans',sans-serif;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="date">Mart 2026</div>
    <div class="title" id="pageTitle">Finansal Özet</div>
  </div>
  <div id="dots">
    <div class="dot active" onclick="goTab(0)"></div>
    <div class="dot inactive" onclick="goTab(1)"></div>
    <div class="dot inactive" onclick="goTab(2)"></div>
  </div>
  <div id="content"></div>
  <div id="nav">
    <button class="nav-btn active" onclick="goTab(0)"><span class="icon">◎</span><span class="lbl">Özet</span></button>
    <button class="nav-btn" onclick="goTab(1)"><span class="icon">▦</span><span class="lbl">Giderler</span></button>
    <button class="nav-btn" onclick="goTab(2)"><span class="icon">↻</span><span class="lbl">Ödemeler</span></button>
  </div>
</div>

<script>
// ── Sabitler ──────────────────────────────────────────────────────────────
const MONTHS = ["Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara","Oca","Şub","Mar"];
const PRESET_COLORS = ["#2D6A4F","#E76F51","#457B9D","#9B72CF","#E9C46A","#264653","#F4A261","#2A9D8F","#E63946","#6D6875"];
const ODEME_COLORS  = ["#E76F51","#457B9D","#9B72CF","#2A9D8F","#E9C46A","#264653","#F4A261","#E63946","#6D6875","#2D6A4F"];
const GELIR_COLORS  = ["#1B4332","#2D6A4F","#40916C","#52B788","#74C69D","#95D5B2"];
const AUTO_COLORS   = ["#E76F51","#457B9D","#9B72CF","#2A9D8F","#E9C46A","#264653","#F4A261","#E63946","#6D6875","#2D6A4F"];
const KATEGORI_LIST = ["Kredi","Fatura","Abonelik","Kira","Diğer"];
const YONTEM_LIST   = ["Nakit","Kredi Kartı","Otomatik Ödeme","Havale/EFT"];
const YONTEM_COLORS = {"Kredi Kartı":"#9B72CF","Nakit":"#2D6A4F","Otomatik Ödeme":"#457B9D","Havale/EFT":"#E9C46A"};
const APP_VERSION   = "v5";
const TITLES        = ["Finansal Özet","Aylık Giderler","Tekrar Eden Ödemeler"];

let _id = 300;
const uid  = () => ++_id;
const fmt  = n => Number(n).toLocaleString("tr-TR") + " ₺";
const LS   = {
  get:(k,d)=>{try{const v=localStorage.getItem(APP_VERSION+"_"+k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(APP_VERSION+"_"+k,JSON.stringify(v));}catch(e){}}
};

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  tab: 0,
  ozetCats: LS.get("ozetCats",[
    {key:"bakiye",label:"Mevcut Bakiye",color:"#2D6A4F",items:[{id:uid(),label:"Vadesiz Hesap",amount:14500},{id:uid(),label:"Vadeli Mevduat",amount:7000},{id:uid(),label:"Nakit",amount:3000}]},
    {key:"kredi", label:"Kredi Kartı Borcu",color:"#E76F51",items:[{id:uid(),label:"Garanti Bankası",amount:4800},{id:uid(),label:"Yapı Kredi",amount:2100}]},
    {key:"borc",  label:"Diğer Borçlar",color:"#457B9D",items:[{id:uid(),label:"Fatura Borçları",amount:600}]},
  ]),
  manuelCats: LS.get("manuelCats",[]),
  odemeler: LS.get("odemeler",[
    {id:"akbank",  label:"Akbank Kredisi", kategori:"Kredi",   tutar:26000,taksit:18,gecen:0, gun:5, yontem:"Nakit"},
    {id:"konut",   label:"Konut Kredisi",  kategori:"Kredi",   tutar:42000,taksit:36,gecen:12,gun:3, yontem:"Otomatik Ödeme"},
    {id:"netflix", label:"Netflix",        kategori:"Abonelik",tutar:120,  taksit:0, gecen:0, gun:15,yontem:"Kredi Kartı"},
    {id:"dogalgaz",label:"Doğalgaz",       kategori:"Fatura",  tutar:850,  taksit:0, gecen:0, gun:20,yontem:"Kredi Kartı"},
  ]),
  gelirKalemler: LS.get("gelirKalemler",[{id:uid(),label:"Maaş",amount:130000}]),
  // UI state
  ozetSelected: null,
  ozetEditMode: false,
  ozetEditCat: null,
  giderActive: null,
  giderEditMode: false,
  giderEditCatId: null,
  giderGelirAcik: false,
  odemeSelected: null,
  odemeAdding: false,
  odemeEditing: null,
};

function save(){
  LS.set("ozetCats",state.ozetCats);
  LS.set("manuelCats",state.manuelCats);
  LS.set("odemeler",state.odemeler);
  LS.set("gelirKalemler",state.gelirKalemler);
}

function setState(patch){
  Object.assign(state,patch);
  render();
}

// ── Hesaplamalar ──────────────────────────────────────────────────────────
function enrichedOzetCats(){
  let idx=0;
  return state.ozetCats.map(cat=>{
    if(cat.key==="borc"){
      const auto=state.odemeler.filter(o=>o.kategori==="Kredi").map(o=>({id:"auto_"+o.id,label:o.label,amount:o.tutar,auto:true,autoColor:AUTO_COLORS[idx++%AUTO_COLORS.length]}));
      return {...cat,items:[...cat.items.filter(it=>!it.auto),...auto]};
    }
    if(cat.key==="kredi"){
      const auto=state.odemeler.filter(o=>o.yontem==="Kredi Kartı").map(o=>({id:"auto_"+o.id,label:o.label+" (K.Kartı)",amount:o.tutar,auto:true,autoColor:YONTEM_COLORS["Kredi Kartı"]}));
      return {...cat,items:[...cat.items.filter(it=>!it.auto),...auto]};
    }
    return cat;
  });
}

function allGiderCats(){
  const odemeKats=state.odemeler.map((o,i)=>({
    id:"od_"+o.id,label:o.label,color:ODEME_COLORS[i%ODEME_COLORS.length],
    monthly:Array(12).fill(o.tutar),fromOdeme:true,
  }));
  return [...odemeKats,...state.manuelCats];
}

// ── Navigasyon ────────────────────────────────────────────────────────────
function goTab(t){
  state.tab=t;
  state.ozetSelected=null;
  state.ozetEditMode=false;
  state.ozetEditCat=null;
  state.giderActive=null;
  state.odemeSelected=null;
  state.odemeAdding=false;
  state.odemeEditing=null;
  render();
}

// ── SVG Donut ─────────────────────────────────────────────────────────────
function donutSVG(cats,selected){
  const totals=cats.map(c=>c.items.reduce((a,b)=>a+b.amount,0));
  const grand=totals.reduce((a,b)=>a+b,0)||1;
  const cx=120,cy=120,r=90,inner=58,TAU=2*Math.PI;
  let cum=0;
  let paths="";
  cats.forEach((cat,i)=>{
    const frac=Math.max(totals[i]/grand,0.001);
    const s=cum*TAU-Math.PI/2; cum+=frac; const e=cum*TAU-Math.PI/2;
    const lg=frac>0.5?1:0;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
    const x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    const ix1=cx+inner*Math.cos(e),iy1=cy+inner*Math.sin(e);
    const ix2=cx+inner*Math.cos(s),iy2=cy+inner*Math.sin(s);
    const d=`M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix1} ${iy1} A${inner} ${inner} 0 ${lg} 0 ${ix2} ${iy2}Z`;
    const op=selected&&selected!==cat.key?0.28:1;
    const sc=selected===cat.key?"scale(1.06)":"scale(1)";
    paths+=`<path d="${d}" fill="${cat.color}" stroke="white" stroke-width="2.5" opacity="${op}" style="cursor:pointer;transform:${sc};transform-origin:120px 120px;transition:opacity .3s,transform .3s" onclick="ozetClickSlice('${cat.key}')"/>`;
  });
  const net=totals[0]-totals.slice(1).reduce((a,b)=>a+b,0);
  const netColor=net>=0?"#2D6A4F":"#E76F51";
  return `<svg viewBox="0 0 240 240" width="240" height="240" style="display:block;margin:0 auto;cursor:pointer">
    ${paths}
    <circle cx="${cx}" cy="${cy}" r="${inner-2}" fill="white"/>
    <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="11" fill="#aaa">Net Durum</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="13" font-weight="700" fill="${netColor}">${fmt(net)}</text>
  </svg>`;
}

// ── Bar Chart ─────────────────────────────────────────────────────────────
function barChartSVG(cats,gelir,active){
  const W=368,CHART_H=220,LABEL_H=16,H=CHART_H+LABEL_H;
  const GAP=3,barW=Math.max(Math.floor((W-GAP*(MONTHS.length-1))/MONTHS.length),4);
  const monthlyTotals=MONTHS.map((_,mi)=>cats.reduce((s,c)=>s+(c.monthly[mi]||0),0));
  const maxVal=Math.max(gelir,...monthlyTotals,1);
  let lines="",bars="",labels="";
  [0.25,0.5,0.75,1].forEach(t=>{
    lines+=`<line x1="0" x2="${W}" y1="${CHART_H*(1-t)}" y2="${CHART_H*(1-t)}" stroke="#f4f4f4" stroke-width="1"/>`;
  });
  MONTHS.forEach((month,mi)=>{
    const x=mi*(barW+GAP);
    const totalGider=monthlyTotals[mi];
    const kalan=Math.max(gelir-totalGider,0);
    const gelirH=(gelir/maxVal)*CHART_H;
    const kalanH=(kalan/maxVal)*CHART_H;
    const sorted=[...cats].map(c=>({...c,val:c.monthly[mi]||0})).filter(c=>c.val>0).sort((a,b)=>b.val-a.val);
    let stackY=CHART_H;
    sorted.forEach((c,ri)=>{
      const h=(c.val/maxVal)*CHART_H;
      const y=stackY-h;
      stackY-=h;
      const op=active&&active!==c.id?0.15:1;
      bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(h,0.5)}" fill="${c.color}" rx="${ri===sorted.length-1?2:0}" opacity="${op}" style="cursor:pointer;transition:opacity .2s" onclick="giderClick('${c.id}')"/>`;
    });
    if(kalanH>0.5) bars+=`<rect x="${x}" y="${CHART_H-gelirH}" width="${barW}" height="${kalanH}" fill="#1B4332" rx="2" opacity="0.9" style="pointer-events:none"/>`;
    labels+=`<text x="${x+barW/2}" y="${H-2}" text-anchor="middle" font-size="8" fill="#ccc">${month}</text>`;
  });
  return `<svg width="${W}" height="${H}" style="display:block;width:100%">${lines}${bars}${labels}</svg>`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("pageTitle").textContent=TITLES[state.tab];
  document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",i===state.tab));
  document.querySelectorAll(".dot").forEach((d,i)=>{d.className="dot "+(i===state.tab?"active":"inactive");});
  const c=document.getElementById("content");
  if(state.tab===0) c.innerHTML=renderOzet();
  else if(state.tab===1) c.innerHTML=renderGiderler();
  else c.innerHTML=renderOdemeler();
}

// ── ÖZET SEKMESİ ──────────────────────────────────────────────────────────
function renderOzet(){
  const cats=enrichedOzetCats();
  let html=`<div style="padding:18px 0 4px">${donutSVG(cats,state.ozetSelected)}</div>`;
  html+=`<div style="padding:4px 16px 8px;display:flex;flex-direction:column;gap:6px">`;
  cats.forEach(cat=>{
    const total=cat.items.reduce((a,b)=>a+b.amount,0);
    const sel=state.ozetSelected===cat.key;
    html+=`<div class="card ${sel?"selected":""}" style="border-color:${sel?cat.color:"transparent"}" onclick="ozetClickCard('${cat.key}')">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dot-color" style="background:${cat.color}"></div>
        ${state.ozetEditMode
          ? `<input value="${cat.label}" onblur="ozetRenamecat('${cat.key}',this.value)" onclick="event.stopPropagation()" style="font-size:13px;border:none;border-bottom:1px solid #ddd;background:transparent;outline:none;width:130px;font-family:'DM Sans',sans-serif"/>`
          : `<span style="font-size:13px;color:#444">${cat.label}</span>`}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:600;color:${cat.color}">${fmt(total)}</span>
        ${state.ozetEditMode?`<button onclick="ozetDelCat('${cat.key}');event.stopPropagation()" style="background:#fee;border:none;border-radius:6px;padding:2px 7px;color:#E76F51;cursor:pointer;font-size:11px">Sil</button>`:""}
      </div>
    </div>`;
  });

  if(state.ozetEditMode){
    html+=`<button onclick="ozetAddCatForm()" style="padding:9px;border:1.5px dashed #ccc;border-radius:12px;background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%">+ Yeni Kategori</button>`;
  }
  html+=`</div>`;
  html+=`<div style="text-align:center;padding-bottom:8px">
    <button onclick="toggleOzetEdit()" style="font-size:12px;padding:7px 20px;border-radius:20px;border:1.5px solid #ddd;background:${state.ozetEditMode?"#222":"white"};color:${state.ozetEditMode?"white":"#555"};cursor:pointer;font-family:'DM Sans',sans-serif">
      ${state.ozetEditMode?"✓ Bitti":"✎ Düzenle"}
    </button>
  </div>`;
  html+=`<div id="ozetPanel"></div>`;

  // Detay/düzenleme paneli
  if(state.ozetSelected&&!state.ozetEditMode){
    const cat=cats.find(c=>c.key===state.ozetSelected);
    if(cat){
      let items="";
      cat.items.forEach(it=>{
        const c=it.autoColor||cat.color;
        items+=`<div style="display:flex;justify-content:space-between;padding:9px 12px;background:#f9f9f9;border-radius:10px;border-left:3px solid ${c}">
          <span style="font-size:13px;color:#444">${it.label}</span>
          <span style="font-size:13px;font-weight:600;color:${c}">${fmt(it.amount)}</span>
        </div>`;
      });
      html+=`<div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div><div style="font-size:11px;color:#aaa">${cat.label}</div>
          <div style="font-size:18px;font-weight:700;color:${cat.color};font-family:'DM Serif Display',serif">${fmt(cat.items.reduce((a,b)=>a+b.amount,0))}</div></div>
          <button class="btn-close" onclick="setState({ozetSelected:null})">×</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px">${items}</div>
        <button onclick="setState({ozetSelected:null,ozetEditMode:true,ozetEditCat:'${cat.key}'})" style="margin-top:8px;padding:8px;border:1.5px dashed #ccc;border-radius:10px;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%">✎ Düzenle</button>
      </div>`;
    }
  }

  if(state.ozetEditMode&&state.ozetEditCat){
    const cat=state.ozetCats.find(c=>c.key===state.ozetEditCat);
    if(cat){
      let rows="";
      cat.items.filter(it=>!it.auto).forEach(it=>{
        rows+=`<div style="display:flex;gap:6px;align-items:flex-end">
          <div class="lbl-wrap" style="flex:2"><span>Kalem Adı</span><input class="inp" value="${it.label}" onchange="ozetUpdateItem('${cat.key}','${it.id}','label',this.value)"/></div>
          <div class="lbl-wrap" style="flex:1"><span>Tutar (₺)</span><input class="inp" type="number" value="${it.amount||""}" placeholder="0" onchange="ozetUpdateItem('${cat.key}','${it.id}','amount',this.value)"/></div>
          <button onclick="ozetDelItem('${cat.key}','${it.id}')" style="background:#fee;border:none;border-radius:7px;padding:7px 8px;color:#E76F51;cursor:pointer;font-size:13px;margin-bottom:1px">×</button>
        </div>`;
      });
      html+=`<div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:14px;font-weight:600;color:#222">${cat.label}</span>
          <button class="btn-close" onclick="setState({ozetEditCat:null})">×</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto">${rows}</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button onclick="ozetAddItem('${cat.key}')" style="flex:1;padding:8px;border:1.5px dashed #ccc;border-radius:10px;background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">+ Ekle</button>
          <button class="btn-primary" onclick="setState({ozetEditCat:null})">Kaydet</button>
        </div>
      </div>`;
    }
  }

  return html;
}

function ozetClickSlice(key){ if(!state.ozetEditMode) setState({ozetSelected:state.ozetSelected===key?null:key,ozetEditCat:null}); }
function ozetClickCard(key){ if(!state.ozetEditMode) setState({ozetSelected:state.ozetSelected===key?null:key,ozetEditCat:null}); }
function toggleOzetEdit(){ setState({ozetEditMode:!state.ozetEditMode,ozetSelected:null,ozetEditCat:null}); }
function ozetRenamecat(key,val){ state.ozetCats=state.ozetCats.map(c=>c.key!==key?c:{...c,label:val}); save(); render(); }
function ozetDelCat(key){ state.ozetCats=state.ozetCats.filter(c=>c.key!==key); if(state.ozetSelected===key)state.ozetSelected=null; save(); render(); }
function ozetUpdateItem(catKey,id,field,val){ state.ozetCats=state.ozetCats.map(c=>c.key!==catKey?c:{...c,items:c.items.map(it=>it.id!==id?it:{...it,[field]:field==="amount"?Number(val)||0:val})}); save(); render(); }
function ozetDelItem(catKey,id){ state.ozetCats=state.ozetCats.map(c=>c.key!==catKey?c:{...c,items:c.items.filter(it=>it.id!==id)}); save(); render(); }
function ozetAddItem(catKey){ state.ozetCats=state.ozetCats.map(c=>c.key!==catKey?c:{...c,items:[...c.items,{id:uid(),label:"Yeni Kalem",amount:0}]}); save(); render(); }
function ozetAddCatForm(){
  const key="cat_"+uid();
  const label=prompt("Kategori adı:");
  if(!label)return;
  state.ozetCats=[...state.ozetCats,{key,label:label.trim(),color:PRESET_COLORS[state.ozetCats.length%PRESET_COLORS.length],items:[]}];
  save(); render();
}

// ── GİDERLER SEKMESİ ──────────────────────────────────────────────────────
function renderGiderler(){
  const cats=allGiderCats();
  const toplamGelir=state.gelirKalemler.reduce((a,k)=>a+k.amount,0);
  let html=`<div style="padding:12px 14px 10px">`;

  // Gelir bölümü
  html+=`<div style="background:#f0faf4;border-radius:12px;margin-bottom:12px;border:1.5px solid #b7e4c7;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer" onclick="toggleGelir()">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:9px;height:9px;border-radius:50%;background:#1B4332"></div>
        <span style="font-size:13px;color:#1B4332;font-weight:600">Toplam Gelir</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:700;color:#1B4332">${fmt(toplamGelir)}</span>
        <span style="font-size:12px;color:#aaa">${state.giderGelirAcik?"▲":"▼"}</span>
      </div>
    </div>`;

  if(state.giderGelirAcik){
    html+=`<div onclick="event.stopPropagation()" style="padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #d8f0e4">`;
    state.gelirKalemler.forEach((k,i)=>{
      const c=GELIR_COLORS[i%GELIR_COLORS.length];
      html+=`<div style="display:flex;flex-direction:column;gap:4px;padding:10px;background:white;border-radius:10px;border:1.5px solid ${c}44;border-left:3px solid ${c}">
        <div style="display:flex;gap:6px">
          <div class="lbl-wrap" style="flex:2"><span>Gelir Adı</span><input class="inp" value="${k.label}" onchange="gelirUpdateLabel('${k.id}',this.value)" style="border:1px solid #ddd;background:#fafafa"/></div>
          <div class="lbl-wrap" style="flex:1"><span>Tutar (₺)</span><input class="inp" type="number" value="${k.amount||""}" placeholder="0" onchange="gelirUpdateAmount('${k.id}',this.value)" style="border:1px solid #ddd;background:#fafafa"/></div>
        </div>
        <button onclick="gelirDel('${k.id}');event.stopPropagation()" style="align-self:flex-end;background:#fee;border:none;border-radius:7px;padding:5px 12px;color:#E76F51;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif">Sil</button>
      </div>`;
    });
    html+=`<div style="display:flex;gap:7px;margin-top:2px">
      <button onclick="gelirAdd()" style="flex:1;padding:8px;border:1.5px dashed #b7e4c7;border-radius:9px;background:transparent;color:#2D6A4F;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">+ Ekle</button>
      <button onclick="toggleGelir()" style="flex:1;padding:8px;background:#1B4332;color:white;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600">✓ Bitti</button>
    </div></div>`;
  }
  html+=`</div>`;

  // Bar chart
  html+=`<div style="width:100%">${barChartSVG(cats,toplamGelir,state.giderActive)}</div>`;

  // Legend
  html+=`<div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin:10px 0 4px">
    <div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:50%;background:#1B4332"></div><span style="font-size:11px;color:#1B4332;font-weight:600">Kalan</span></div>`;
  cats.forEach(cat=>{
    const op=state.giderActive&&state.giderActive!==cat.id?0.3:1;
    html+=`<div style="display:flex;align-items:center;gap:5px;opacity:${op};cursor:pointer" onclick="giderClick('${cat.id}')">
      <div style="width:9px;height:9px;border-radius:50%;background:${cat.color}"></div>
      <span style="font-size:11px;color:#555">${cat.label}</span>
      ${state.giderEditMode&&!cat.fromOdeme?`<button onclick="giderDelCat('${cat.id}');event.stopPropagation()" style="background:#fee;border:none;border-radius:5px;padding:1px 5px;font-size:10px;color:#E76F51;cursor:pointer">×</button>`:""}
      ${state.giderEditMode&&cat.fromOdeme?`<span style="font-size:9px;color:#ccc">(otomatik)</span>`:""}
    </div>`;
  });
  if(state.giderEditMode) html+=`<button onclick="giderAddCatForm()" style="font-size:11px;padding:2px 8px;border:1px dashed #ccc;border-radius:8px;background:transparent;color:#888;cursor:pointer">+ Ekle</button>`;
  html+=`</div>`;

  // Aylık düzenleme
  if(state.giderEditMode&&state.giderEditCatId){
    const cat=state.manuelCats.find(c=>c.id===state.giderEditCatId);
    if(cat){
      let grid="";
      MONTHS.forEach((m,mi)=>{
        grid+=`<div style="display:flex;flex-direction:column;gap:2px">
          <span style="font-size:9px;color:#aaa">${m}</span>
          <input type="number" class="inp" value="${cat.monthly[mi]||""}" placeholder="0" onchange="giderUpdateMonthly('${cat.id}',${mi},this.value)" style="padding:5px 6px;font-size:12px;border-radius:7px"/>
        </div>`;
      });
      html+=`<div style="padding:12px;background:#fafafa;border-radius:12px;border-left:3px solid ${cat.color};margin-bottom:8px;animation:slideUp .2s ease">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600;color:${cat.color}">${cat.label}</span>
          <button class="btn-close" style="width:24px;height:24px;font-size:14px" onclick="setState({giderEditCatId:null})">×</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">${grid}</div>
      </div>`;
    }
  }

  html+=`<div style="text-align:center;margin-top:8px">
    <button onclick="toggleGiderEdit()" style="font-size:12px;padding:7px 20px;border-radius:20px;border:1.5px solid #ddd;background:${state.giderEditMode?"#222":"white"};color:${state.giderEditMode?"white":"#555"};cursor:pointer;font-family:'DM Sans',sans-serif">
      ${state.giderEditMode?"✓ Bitti":"✎ Düzenle"}
    </button>
  </div>`;

  // Detay paneli
  if(!state.giderEditMode&&state.giderActive){
    const cat=allGiderCats().find(c=>c.id===state.giderActive);
    if(cat){
      let grid="";
      MONTHS.forEach((month,mi)=>{
        grid+=`<div style="text-align:center;padding:7px 3px;background:white;border-radius:8px;border:1px solid #eee">
          <div style="font-size:9px;color:#bbb;margin-bottom:2px">${month}</div>
          <div style="font-size:11px;font-weight:600;color:#333">${(cat.monthly[mi]||0).toLocaleString("tr-TR")}₺</div>
        </div>`;
      });
      const yillik=cat.monthly.reduce((a,b)=>a+b,0);
      const aylik=Math.round(yillik/12);
      html+=`<div style="margin-top:10px;padding:14px;background:#fafafa;border-radius:14px;border-left:3px solid ${cat.color};animation:slideUp .25s ease">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div><div style="font-size:11px;color:#aaa">Kategori</div>
          <div style="font-size:16px;font-weight:700;color:${cat.color};font-family:'DM Serif Display',serif">${cat.label}</div></div>
          <button class="btn-close" style="width:27px;height:27px;font-size:15px" onclick="setState({giderActive:null})">×</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">${grid}</div>
        <div style="margin-top:9px;display:flex;justify-content:space-between;font-size:12px;color:#888">
          <span>Aylık ort.: <b style="color:#333">${fmt(aylik)}</b></span>
          <span>Yıllık: <b style="color:#333">${fmt(yillik)}</b></span>
        </div>
      </div>`;
    }
  }

  html+=`</div>`;
  return html;
}

function toggleGelir(){ setState({giderGelirAcik:!state.giderGelirAcik}); }
function gelirUpdateLabel(id,val){ state.gelirKalemler=state.gelirKalemler.map(g=>g.id!==id?g:{...g,label:val}); save(); render(); }
function gelirUpdateAmount(id,val){ state.gelirKalemler=state.gelirKalemler.map(g=>g.id!==id?g:{...g,amount:Number(val)||0}); save(); render(); }
function gelirDel(id){ state.gelirKalemler=state.gelirKalemler.filter(g=>g.id!==id); save(); render(); }
function gelirAdd(){ state.gelirKalemler=[...state.gelirKalemler,{id:uid(),label:"Yeni Gelir",amount:0}]; save(); render(); }
function giderClick(id){ setState({giderActive:state.giderActive===id?null:id}); }
function toggleGiderEdit(){ setState({giderEditMode:!state.giderEditMode,giderActive:null,giderEditCatId:null}); }
function giderDelCat(id){ state.manuelCats=state.manuelCats.filter(c=>c.id!==id); if(state.giderActive===id)state.giderActive=null; save(); render(); }
function giderUpdateMonthly(id,mi,val){ state.manuelCats=state.manuelCats.map(c=>c.id!==id?c:{...c,monthly:c.monthly.map((v,i)=>i===mi?Number(val)||0:v)}); save(); render(); }
function giderAddCatForm(){
  const label=prompt("Kategori adı:");
  if(!label)return;
  state.manuelCats=[...state.manuelCats,{id:"mc_"+uid(),label:label.trim(),color:PRESET_COLORS[state.manuelCats.length%PRESET_COLORS.length],monthly:Array(12).fill(0)}];
  save(); render();
}

// ── ÖDEMELER SEKMESİ ──────────────────────────────────────────────────────
function renderOdemeler(){
  let html=`<div style="padding:14px 14px 10px">`;

  if(state.odemeAdding){
    html+=odemeFormHTML("Yeni Ödeme",{label:"",kategori:"Kredi",tutar:"",taksit:"",gecen:"",gun:"",yontem:"Nakit"},"odemeFormSave","setState({odemeAdding:false})");
  }
  if(state.odemeEditing){
    const o=state.odemeler.find(x=>x.id===state.odemeEditing);
    if(o) html+=odemeFormHTML("Ödemeyi Düzenle",o,"odemeEditSave","setState({odemeEditing:null})");
  }

  state.odemeler.forEach((o,i)=>{
    const color=ODEME_COLORS[i%ODEME_COLORS.length];
    const hasTaksit=o.taksit>0;
    const progress=hasTaksit?o.gecen/o.taksit:0;
    const kalan=hasTaksit?o.taksit-o.gecen:null;
    const sel=state.odemeSelected===o.id;
    const yontemColor=YONTEM_COLORS[o.yontem||"Nakit"]||"#aaa";

    html+=`<div style="margin-bottom:8px">
      <div style="padding:12px 14px;border-radius:14px;background:${sel?"#f5f5f2":"#fafafa"};border:1.5px solid ${sel?color:"transparent"};cursor:pointer;transition:all .2s" onclick="odemeSelect('${o.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${sel&&hasTaksit?8:0}px">
          <div>
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
              <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
              <span style="font-size:14px;font-weight:600;color:#222">${o.label}</span>
            </div>
            <div style="display:flex;gap:5px;margin-left:15px;flex-wrap:wrap">
              <span class="tag">${o.kategori}</span>
              <span style="font-size:10px;color:#aaa">Her ayın <b style="color:#555">${o.gun}.</b> günü</span>
              <span style="font-size:10px;padding:1px 6px;border-radius:5px;background:${yontemColor}22;color:${yontemColor};font-weight:600">${o.yontem||"Nakit"}</span>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:15px;font-weight:700;color:${color}">${fmt(o.tutar)}</div>
            ${hasTaksit?`<div style="font-size:10px;color:#aaa">${o.gecen}/${o.taksit} taksit</div>`:""}
          </div>
        </div>`;

    if(sel&&hasTaksit){
      html+=`<div style="animation:slideUp .2s ease">
        <div style="height:7px;background:#eee;border-radius:10px;overflow:hidden;margin-bottom:5px">
          <div style="height:100%;width:${Math.min(progress*100,100)}%;background:${color};border-radius:10px;transition:width .5s ease"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa">
          <span>Ödenen: <b style="color:#333">${fmt(Math.round(o.tutar/o.taksit*o.gecen))}</b></span>
          <span>Kalan: <b style="color:${color}">${kalan} taksit</b> (${fmt(Math.round(o.tutar/o.taksit*kalan))})</span>
        </div>
      </div>`;
    }
    if(sel&&!hasTaksit) html+=`<div style="font-size:11px;color:#aaa;margin-top:4px">Süresiz / tekrar eden ödeme</div>`;
    html+=`</div>`;

    if(sel){
      html+=`<div style="display:flex;gap:7px;margin-top:4px;padding:0 2px">
        <button class="btn-secondary" onclick="odemeStartEdit('${o.id}')">✎ Düzenle</button>
        <button class="btn-danger" onclick="odemeDel('${o.id}')">Sil</button>
      </div>`;
    }
    html+=`</div>`;
  });

  if(!state.odemeAdding&&!state.odemeEditing){
    html+=`<button class="dashed-btn" onclick="setState({odemeAdding:true,odemeSelected:null})">+ Yeni Ödeme Ekle</button>`;
  }
  html+=`</div>`;
  return html;
}

function odemeFormHTML(title,o,saveFn,cancelFn){
  const kategoriOpts=KATEGORI_LIST.map(k=>`<option value="${k}"${o.kategori===k?" selected":""}>${k}</option>`).join("");
  const yontemOpts=YONTEM_LIST.map(y=>`<option value="${y}"${(o.yontem||"Nakit")===y?" selected":""}>${y}</option>`).join("");
  return `<div style="padding:14px;background:#fafafa;border-radius:14px;border:1.5px dashed #ddd;margin-bottom:10px;animation:slideUp .2s ease" id="odemeForm">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600;color:#222">${title}</span>
      <button class="btn-close" onclick="${cancelFn}">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="lbl-wrap"><span>Ödeme Adı</span><input class="inp" id="of_label" value="${o.label}" placeholder="Ödeme adı"/></div>
      <div style="display:flex;gap:7px">
        <div class="lbl-wrap" style="flex:1"><span>Kategori</span><select class="inp" id="of_kategori">${kategoriOpts}</select></div>
        <div class="lbl-wrap" style="flex:1"><span>Ödeme Günü</span><input class="inp" id="of_gun" type="number" value="${o.gun||""}" placeholder="0"/></div>
      </div>
      <div class="lbl-wrap"><span>Tutar (₺)</span><input class="inp" id="of_tutar" type="number" value="${o.tutar||""}" placeholder="0"/></div>
      <div style="display:flex;gap:7px">
        <div class="lbl-wrap" style="flex:1"><span>Toplam Taksit (0=süresiz)</span><input class="inp" id="of_taksit" type="number" value="${o.taksit||""}" placeholder="0"/></div>
        <div class="lbl-wrap" style="flex:1"><span>Geçen Taksit</span><input class="inp" id="of_gecen" type="number" value="${o.gecen||""}" placeholder="0"/></div>
      </div>
      <div class="lbl-wrap"><span>Ödeme Yöntemi</span><select class="inp" id="of_yontem">${yontemOpts}</select></div>
      <button class="btn-primary" onclick="${saveFn}()">Kaydet</button>
    </div>
  </div>`;
}

function odemeFormData(){
  return {
    label: document.getElementById("of_label").value,
    kategori: document.getElementById("of_kategori").value,
    gun: Number(document.getElementById("of_gun").value)||1,
    tutar: Number(document.getElementById("of_tutar").value)||0,
    taksit: Number(document.getElementById("of_taksit").value)||0,
    gecen: Number(document.getElementById("of_gecen").value)||0,
    yontem: document.getElementById("of_yontem").value,
  };
}

function odemeFormSave(){
  const d=odemeFormData();
  if(!d.label||!d.tutar)return;
  state.odemeler=[...state.odemeler,{id:"o_"+uid(),...d}];
  state.odemeAdding=false;
  save(); render();
}
function odemeEditSave(){
  const d=odemeFormData();
  state.odemeler=state.odemeler.map(o=>o.id!==state.odemeEditing?o:{...o,...d});
  state.odemeEditing=null;
  save(); render();
}
function odemeSelect(id){ setState({odemeSelected:state.odemeSelected===id?null:id}); }
function odemeStartEdit(id){ setState({odemeEditing:id,odemeSelected:null,odemeAdding:false}); }
function odemeDel(id){ state.odemeler=state.odemeler.filter(o=>o.id!==id); if(state.odemeSelected===id)state.odemeSelected=null; save(); render(); }

// ── Swipe ─────────────────────────────────────────────────────────────────
let touchX=null;
document.addEventListener("touchstart",e=>{touchX=e.touches[0].clientX;});
document.addEventListener("touchend",e=>{
  if(touchX===null)return;
  const diff=touchX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50) goTab(diff>0?Math.min(state.tab+1,2):Math.max(state.tab-1,0));
  touchX=null;
});

// ── Başlat ────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
