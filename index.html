// ── Donut ──────────────────────────────────────────────────────────────────
function DonutChart({ categories, selected, onSelect }) {
  const totals = categories.map(c => c.items.reduce((a,b)=>a+b.amount,0));
  const grand = totals.reduce((a,b)=>a+b,0)||1;
  const cx=120,cy=120,r=90,inner=58,TAU=2*Math.PI;
  let cum=0;
  const slices = categories.map((cat,i)=>{
    const frac=Math.max(totals[i]/grand,0.001);
    const s=cum*TAU-Math.PI/2; cum+=frac; const e=cum*TAU-Math.PI/2;
    const lg=frac>0.5?1:0;
    const P=(a,rr)=>[cx+rr*Math.cos(a),cy+rr*Math.sin(a)];
    const [x1,y1]=P(s,r),[x2,y2]=P(e,r),[ix1,iy1]=P(e,inner),[ix2,iy2]=P(s,inner);
    return {key:cat.key,color:cat.color,d:`M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix1} ${iy1} A${inner} ${inner} 0 ${lg} 0 ${ix2} ${iy2}Z`};
  });
  const net=totals[0]-totals.slice(1).reduce((a,b)=>a+b,0);
  return (
    <svg viewBox="0 0 240 240" width="240" height="240" style={{display:"block",margin:"0 auto",cursor:"pointer"}}>
      {slices.map(sl=>(
        <path key={sl.key} d={sl.d} fill={sl.color} stroke="white" strokeWidth="2.5"
          opacity={selected&&selected!==sl.key?0.28:1}
          style={{transition:"opacity .3s,transform .3s",transformOrigin:"120px 120px",transform:selected===sl.key?"scale(1.06)":"scale(1)"}}
          onClick={()=>onSelect(selected===sl.key?null:sl.key)}/>
      ))}
      <circle cx={cx} cy={cy} r={inner-2} fill="white"/>
      <text x={cx} y={cy-10} textAnchor="middle" fontSize="11" fill="#aaa" fontFamily="'DM Sans',sans-serif">Net Durum</text>
      <text x={cx} y={cy+13} textAnchor="middle" fontSize="13" fontWeight="700"
        fill={net>=0?"#2D6A4F":"#E76F51"} fontFamily="'DM Sans',sans-serif">{fmt(net)}</text>
    </svg>
  );
}

// ── Düzenleme Paneli ───────────────────────────────────────────────────────
function EditPanel({ cat, onSave, onClose }) {
  const [localItems, setLocalItems] = useState(() => cat.items.map(it=>({...it})));
  const updateLocal=(id,f,v)=>setLocalItems(items=>items.map(it=>it.id!==id?it:{...it,[f]:v}));
  const handleSave=()=>{ onSave(localItems.map(it=>({...it,amount:Number(it.amount)||0}))); onClose(); };
  return (
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderRadius:"20px 20px 0 0",padding:"20px 16px 24px",boxShadow:"0 -8px 40px rgba(0,0,0,0.12)",animation:"slideUp .3s ease",zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:14,fontWeight:600,color:"#222"}}>{cat.label}</span>
        <button onClick={onClose} style={{background:"#f4f4f4",border:"none",borderRadius:"50%",width:30,height:30,fontSize:17,cursor:"pointer",color:"#555",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:200,overflowY:"auto"}}>
        {localItems.map(it=>(
          <div key={it.id} style={{display:"flex",gap:6,alignItems:"flex-end"}}>
            <div style={{flex:2,display:"flex",flexDirection:"column",gap:3}}>
              <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>Kalem Adı</span>
              <input value={it.label} onChange={e=>updateLocal(it.id,"label",e.target.value)}
                style={{fontSize:13,padding:"7px 8px",borderRadius:8,border:"1px solid #ddd",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:3}}>
              <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>Tutar (₺)</span>
              <input type="number" value={it.amount===0?"":it.amount} onChange={e=>updateLocal(it.id,"amount",e.target.value)} placeholder="0"
                style={{fontSize:13,padding:"7px 8px",borderRadius:8,border:"1px solid #ddd",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
            </div>
            <button onClick={()=>setLocalItems(items=>items.filter(i=>i.id!==it.id))}
              style={{background:"#fee",border:"none",borderRadius:7,padding:"7px 8px",color:"#E76F51",cursor:"pointer",fontSize:13,marginBottom:0}}>×</button>
          </div>
        ))}

        <button onClick={()=>setLocalItems(items=>[...items,{id:uid(),label:"Yeni Kalem",amount:0}])}

        <button onClick={handleSave}

      </div>
    </div>
  );
}

// ── Giderler Bar Chart ─────────────────────────────────────────────────────
function BarChart({ cats, gelir, active, onSelect }) {
  const containerRef = useRef(null);
  const [width, setWidth] = useState(360);

  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(e => setWidth(e[0].contentRect.width));
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  const GAP = 3;
  const barW = Math.max(Math.floor((width - GAP * (MONTHS.length - 1)) / MONTHS.length), 4);
  const CHART_H = 220;
  const LABEL_H = 16;
  const H = CHART_H + LABEL_H;

  const monthlyTotals = MONTHS.map((_, mi) => cats.reduce((s,c) => s+(c.monthly[mi]||0), 0));
  const maxVal = Math.max(gelir, ...monthlyTotals, 1);

  return (
    <div ref={containerRef} style={{width:"100%"}}>
      <svg width={width} height={H} style={{display:"block"}}>
        {[0.25,0.5,0.75,1].map(t=>(
          <line key={t} x1={0} x2={width} y1={CHART_H*(1-t)} y2={CHART_H*(1-t)} stroke="#f4f4f4" strokeWidth="1"/>
        ))}
        {MONTHS.map((month,mi)=>{
          const x = mi*(barW+GAP);
          const totalGider = monthlyTotals[mi];
          const kalan = Math.max(gelir-totalGider, 0);
          const gelirH = (gelir/maxVal)*CHART_H;
          const kalanH = (kalan/maxVal)*CHART_H;

          // Giderleri büyükten küçüğe sırala, alttan yukarı yığ
          const sorted = [...cats]
            .map(c=>({...c,val:c.monthly[mi]||0}))
            .filter(c=>c.val>0)
            .sort((a,b)=>b.val-a.val);

          let stackY = CHART_H;
          return (
            <g key={month}>
              {sorted.map((c,ri)=>{
                const h=(c.val/maxVal)*CHART_H;
                const y=stackY-h;
                stackY-=h;
                return (
                  <rect key={c.id} x={x} y={y} width={barW} height={Math.max(h,0.5)}
                    fill={c.color} rx={ri===sorted.length-1?2:0}
                    opacity={active&&active!==c.id?0.15:1}
                    style={{cursor:"pointer",transition:"opacity .2s"}}
                    onClick={()=>onSelect(active===c.id?null:c.id)}/>
                );
              })}
              {/* Kalan (net) yeşil dilim — giderlerin üstüne */}
              {kalanH>0.5&&(
                <rect x={x} y={CHART_H-gelirH} width={barW} height={kalanH}
                  fill="#1B4332" rx={2} opacity={0.9}
                  style={{pointerEvents:"none"}}/>
              )}
              <text x={x+barW/2} y={H-2} textAnchor="middle" fontSize="8" fill="#ccc">{month}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

                </div>
                <button onClick={e=>{e.stopPropagation();setGelirKalemler(gs=>gs.filter(g=>g.id!==k.id));}}
                  style={{alignSelf:"flex-end",background:"#fee",border:"none",borderRadius:7,padding:"5px 12px",color:"#E76F51",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>
                  Sil
                </button>
              </div>
            ))}
            <div style={{display:"flex",gap:7,marginTop:2}}>
              <button onClick={()=>setGelirKalemler(gs=>[...gs,{id:uid(),label:"Yeni Gelir",amount:0}])}
                style={{flex:1,padding:"8px",border:"1.5px dashed #b7e4c7",borderRadius:9,background:"transparent",color:"#2D6A4F",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                + Ekle
              </button>
              <button onClick={()=>setGelirAcik(false)}
                style={{flex:1,padding:"8px",background:"#1B4332",color:"white",border:"none",borderRadius:9,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
                ✓ Bitti
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Bar chart — tam genişlik */}
      <BarChart cats={allCats} gelir={toplamGelir} active={active} onSelect={setActive}/>

      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px 12px",margin:"10px 0 4px"}}>
        {/* Gelir açıklaması */}
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:"#1B4332"}}/>
          <span style={{fontSize:11,color:"#1B4332",fontWeight:600}}>Kalan</span>
        </div>
        {allCats.map(cat=>(
          <div key={cat.id} style={{display:"flex",alignItems:"center",gap:5}}>
            <div onClick={()=>!editMode&&setActive(active===cat.id?null:cat.id)}
              style={{display:"flex",alignItems:"center",gap:5,cursor:editMode?"default":"pointer",
                opacity:active&&active!==cat.id?0.3:1,transition:"opacity .2s"}}>
              <div style={{width:9,height:9,borderRadius:"50%",background:cat.color,flexShrink:0}}/>
              <span style={{fontSize:11,color:"#555"}}>{cat.label}</span>
            </div>
            {editMode&&!cat.fromOdeme&&(
              <div style={{display:"flex",gap:3,marginLeft:2}}>
                <button onClick={()=>setEditCatId(editCatId===cat.id?null:cat.id)} style={{background:"#f0f0f0",border:"none",borderRadius:5,padding:"1px 5px",fontSize:10,color:"#555",cursor:"pointer"}}>✎</button>
                <button onClick={()=>deleteCat(cat.id)} style={{background:"#fee",border:"none",borderRadius:5,padding:"1px 5px",fontSize:10,color:"#E76F51",cursor:"pointer"}}>×</button>
              </div>
            )}
            {editMode&&cat.fromOdeme&&<span style={{fontSize:9,color:"#ccc"}}>(otomatik)</span>}
          </div>
        ))}
        {editMode&&!addingCat&&<button onClick={()=>setAddingCat(true)} style={{fontSize:11,padding:"2px 8px",border:"1px dashed #ccc",borderRadius:8,background:"transparent",color:"#888",cursor:"pointer"}}>+ Ekle</button>}
      </div>

      {addingCat&&(
        <div style={{padding:"10px",background:"#fafafa",borderRadius:12,border:"1.5px dashed #ccc",marginBottom:8}}>
          <input placeholder="Kategori adı" value={newLabel} onChange={e=>setNewLabel(e.target.value)} style={{width:"100%",fontSize:13,padding:"6px 9px",borderRadius:8,border:"1px solid #ddd",outline:"none",marginBottom:7,fontFamily:"'DM Sans',sans-serif"}}/>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
            {PRESET_COLORS.map(c=><div key={c} onClick={()=>setNewColor(c)} style={{width:18,height:18,borderRadius:"50%",background:c,cursor:"pointer",outline:newColor===c?"2px solid #333":"none",outlineOffset:2}}/>)}
          </div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={addCat} style={{flex:1,padding:"7px",background:"#222",color:"white",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Ekle</button>
            <button onClick={()=>setAddingCat(false)} style={{flex:1,padding:"7px",background:"#eee",color:"#555",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>İptal</button>
          </div>
        </div>
      )}

      {editMode&&editCat&&(
        <div style={{padding:"12px",background:"#fafafa",borderRadius:12,borderLeft:`3px solid ${editCat.color}`,marginBottom:8,animation:"slideUp .2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:600,color:editCat.color}}>{editCat.label}</span>
            <button onClick={()=>setEditCatId(null)} style={{background:"#eee",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",color:"#777",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
            {MONTHS.map((m,mi)=>(
              <div key={m} style={{display:"flex",flexDirection:"column",gap:2}}>
                <span style={{fontSize:9,color:"#aaa"}}>{m}</span>
                <input type="number" value={editCat.monthly[mi]} onChange={e=>updateMonthly(editCat.id,mi,e.target.value)}
                  style={{fontSize:12,padding:"5px 6px",borderRadius:7,border:"1px solid #ddd",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{textAlign:"center",marginTop:8}}>
        <button onClick={()=>{setEditMode(e=>!e);setActive(null);setEditCatId(null);}} style={{fontSize:12,padding:"7px 20px",borderRadius:20,border:"1.5px solid #ddd",background:editMode?"#222":"white",color:editMode?"white":"#555",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s"}}>
          {editMode?"✓ Bitti":"✎ Düzenle"}
        </button>
      </div>

      {!editMode&&activeCat&&(
        <div style={{marginTop:10,padding:"14px",background:"#fafafa",borderRadius:14,borderLeft:`3px solid ${activeCat.color}`,animation:"slideUp .25s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:"#aaa"}}>Kategori</div>
              <div style={{fontSize:16,fontWeight:700,color:activeCat.color,fontFamily:"'DM Serif Display',serif"}}>{activeCat.label}</div>
            </div>
            <button onClick={()=>setActive(null)} style={{background:"#eee",border:"none",borderRadius:"50%",width:27,height:27,fontSize:15,cursor:"pointer",color:"#777",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
            {MONTHS.map((month,mi)=>(
              <div key={month} style={{textAlign:"center",padding:"7px 3px",background:"white",borderRadius:8,border:"1px solid #eee"}}>
                <div style={{fontSize:9,color:"#bbb",marginBottom:2}}>{month}</div>
                <div style={{fontSize:11,fontWeight:600,color:"#333"}}>{activeCat.monthly[mi].toLocaleString("tr-TR")}₺</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:9,display:"flex",justifyContent:"space-between",fontSize:12,color:"#888"}}>
            <span>Aylık ort.: <b style={{color:"#333"}}>{fmt(Math.round(activeCat.monthly.reduce((a,b)=>a+b,0)/12))}</b></span>
            <span>Yıllık: <b style={{color:"#333"}}>{fmt(activeCat.monthly.reduce((a,b)=>a+b,0))}</b></span>
          </div>
        </div>
      )}
      {!editMode&&!active&&<div style={{textAlign:"center",fontSize:11,color:"#ccc",marginTop:6}}>Detay için bir renge dokun</div>}
    </div>
  );
}

// ── Etiketli Input ─────────────────────────────────────────────────────────
function LInput({ label, value, onChange, type="text", flex }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3,flex:flex||"unset"}}>
      <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>{label}</span>
      <input type={type} value={type==="number"&&value===0?"":value} onChange={onChange} placeholder={type==="number"?"0":""}
        style={{fontSize:13,padding:"8px 10px",borderRadius:9,border:"1px solid #ddd",outline:"none",fontFamily:"'DM Sans',sans-serif",width:"100%"}}/>
    </div>
  );
}

// ── Ödeme Formu (paylaşımlı) ───────────────────────────────────────────────
function OdemeForm({ initial, title, onSave, onCancel }) {
  const [form, setForm] = useState(initial);
  const s = (k) => e => setForm(f=>({...f,[k]:e.target.value}));
  return (
    <div style={{padding:"14px",background:"#fafafa",borderRadius:14,border:"1.5px dashed #ddd",marginBottom:10,animation:"slideUp .2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:14,fontWeight:600,color:"#222"}}>{title}</span>
        <button onClick={onCancel} style={{background:"#eee",border:"none",borderRadius:"50%",width:28,height:28,fontSize:16,cursor:"pointer",color:"#777",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <LInput label="Ödeme Adı" value={form.label} onChange={s("label")}/>
        <div style={{display:"flex",gap:7}}>
          <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
            <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>Kategori</span>
            <select value={form.kategori} onChange={s("kategori")} style={{fontSize:13,padding:"8px 10px",borderRadius:9,border:"1px solid #ddd",outline:"none",background:"white",fontFamily:"'DM Sans',sans-serif"}}>
              {KATEGORI_LIST.map(k=><option key={k}>{k}</option>)}
            </select>
          </div>
          <LInput label="Ödeme Günü" value={form.gun} onChange={s("gun")} type="number" flex={1}/>
        </div>
        <LInput label="Tutar (₺)" value={form.tutar} onChange={s("tutar")} type="number"/>
        <div style={{display:"flex",gap:7}}>
          <LInput label="Toplam Taksit (0 = süresiz)" value={form.taksit} onChange={s("taksit")} type="number" flex={1}/>
          <LInput label="Geçen Taksit" value={form.gecen} onChange={s("gecen")} type="number" flex={1}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>Ödeme Yöntemi</span>
          <select value={form.yontem||"Nakit"} onChange={s("yontem")} style={{fontSize:13,padding:"8px 10px",borderRadius:9,border:"1px solid #ddd",outline:"none",background:"white",fontFamily:"'DM Sans',sans-serif"}}>
            {YONTEM_LIST.map(y=><option key={y}>{y}</option>)}
          </select>
        </div>
        <button onClick={()=>onSave(form)} style={{padding:"10px",background:"#222",color:"white",border:"none",borderRadius:10,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>Kaydet</button>
      </div>
    </div>
  );
}

const YONTEM_LIST = ["Nakit","Kredi Kartı","Otomatik Ödeme","Havale/EFT"];
const YONTEM_COLORS = {"Kredi Kartı":"#9B72CF","Nakit":"#2D6A4F","Otomatik Ödeme":"#457B9D","Havale/EFT":"#E9C46A"};

const EMPTY_FORM = {label:"",kategori:"Kredi",tutar:"",taksit:"",gecen:"",gun:"",yontem:"Nakit"};
const OdemeFormPanel    = ({title,onSave,onCancel})  => <OdemeForm initial={EMPTY_FORM} title={title} onSave={onSave} onCancel={onCancel}/>;
const OdemeDuzenlePanel = ({odeme,onSave,onCancel})  => <OdemeForm initial={{label:odeme.label,kategori:odeme.kategori,tutar:odeme.tutar,taksit:odeme.taksit,gecen:odeme.gecen,gun:odeme.gun,yontem:odeme.yontem||"Nakit"}} title="Ödemeyi Düzenle" onSave={onSave} onCancel={onCancel}/>;

// ── Ödemeler Sekmesi ───────────────────────────────────────────────────────
function OdemelerTab({ odemeler, setOdemeler }) {
  const [selected, setSelected] = useState(null);
  const [adding, setAdding]     = useState(false);
  const [editing, setEditing]   = useState(null);
  const emptyForm = {label:"",kategori:"Kredi",tutar:"",taksit:"",gecen:"",gun:""};
  const [form, setForm] = useState(emptyForm);

  const saveNew=(form)=>{
    if(!form.label||!form.tutar)return;
    setOdemeler(os=>[...os,{id:"o_"+uid(),label:form.label,kategori:form.kategori,tutar:Number(form.tutar),taksit:Number(form.taksit)||0,gecen:Number(form.gecen)||0,gun:Number(form.gun)||1}]);
    setAdding(false);
  };
  const saveEdit=(form)=>{
    setOdemeler(os=>os.map(o=>o.id!==editing?o:{...o,...form,tutar:Number(form.tutar),taksit:Number(form.taksit)||0,gecen:Number(form.gecen)||0,gun:Number(form.gun)||1}));
    setEditing(null);
  };
  const startEdit=(o)=>{setEditing(o.id);setSelected(null);};
  const deleteOdeme=(id)=>{setOdemeler(os=>os.filter(o=>o.id!==id));if(selected===id)setSelected(null);};

  return (
    <div style={{padding:"14px 14px 10px"}}>
      {adding&&<OdemeFormPanel title="Yeni Ödeme" onSave={saveNew} onCancel={()=>setAdding(false)}/>}
      {editing&&<OdemeDuzenlePanel odeme={odemeler.find(o=>o.id===editing)} onSave={saveEdit} onCancel={()=>setEditing(null)}/>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {odemeler.map((o,i)=>{
          const color=ODEME_COLORS[i%ODEME_COLORS.length];
          const hasTaksit=o.taksit>0;
          const progress=hasTaksit?o.gecen/o.taksit:0;
          const kalan=hasTaksit?o.taksit-o.gecen:null;
          const isSelected=selected===o.id;
          return (
            <div key={o.id}>
              <div onClick={()=>setSelected(isSelected?null:o.id)}
                style={{padding:"12px 14px",borderRadius:14,background:isSelected?"#f5f5f2":"#fafafa",
                  border:isSelected?`1.5px solid ${color}`:"1.5px solid transparent",cursor:"pointer",transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:isSelected&&hasTaksit?8:0}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
                      <span style={{fontSize:14,fontWeight:600,color:"#222"}}>{o.label}</span>
                    </div>
                    <div style={{display:"flex",gap:5,marginLeft:15,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:"#aaa",background:"#f0f0f0",padding:"1px 6px",borderRadius:5}}>{o.kategori}</span>
                      <span style={{fontSize:10,color:"#aaa"}}>Her ayın <b style={{color:"#555"}}>{o.gun}.</b> günü</span>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:YONTEM_COLORS[o.yontem||"Nakit"]+"22",color:YONTEM_COLORS[o.yontem||"Nakit"],fontWeight:600}}>{o.yontem||"Nakit"}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:700,color}}>{fmt(o.tutar)}</div>
                    {hasTaksit&&<div style={{fontSize:10,color:"#aaa"}}>{o.gecen}/{o.taksit} taksit</div>}
                  </div>
                </div>
                {isSelected&&hasTaksit&&(
                  <div style={{animation:"slideUp .2s ease"}}>
                    <div style={{height:7,background:"#eee",borderRadius:10,overflow:"hidden",marginBottom:5}}>
                      <div style={{height:"100%",width:`${Math.min(progress*100,100)}%`,background:color,borderRadius:10,transition:"width .5s ease"}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa"}}>
                      <span>Ödenen: <b style={{color:"#333"}}>{fmt(Math.round(o.tutar/o.taksit*o.gecen))}</b></span>
                      <span>Kalan: <b style={{color}}>{kalan} taksit</b> ({fmt(Math.round(o.tutar/o.taksit*kalan))})</span>
                    </div>
                  </div>
                )}
                {isSelected&&!hasTaksit&&<div style={{fontSize:11,color:"#aaa",marginTop:4}}>Süresiz / tekrar eden ödeme</div>}
              </div>
              {isSelected&&(
                <div style={{display:"flex",gap:7,marginTop:4,padding:"0 2px"}}>
                  <button onClick={()=>startEdit(o)} style={{flex:1,padding:"7px",background:"white",border:"1px solid #ddd",borderRadius:9,fontSize:12,cursor:"pointer",color:"#444",fontFamily:"'DM Sans',sans-serif"}}>✎ Düzenle</button>
                  <button onClick={()=>deleteOdeme(o.id)} style={{flex:1,padding:"7px",background:"#fee",border:"none",borderRadius:9,fontSize:12,cursor:"pointer",color:"#E76F51",fontFamily:"'DM Sans',sans-serif"}}>Sil</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {!adding&&!editing&&(
        <button onClick={()=>{setAdding(true);setSelected(null);}} style={{marginTop:10,width:"100%",padding:"11px",border:"1.5px dashed #ccc",borderRadius:12,background:"transparent",color:"#888",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
          + Yeni Ödeme Ekle
        </button>
      )}
    </div>
  );
}

// ── Ana App ────────────────────────────────────────────────────────────────
const APP_VERSION = "v4";
const LS = {
  get: (key, def) => { try { const v=localStorage.getItem(APP_VERSION+"_"+key); return v?JSON.parse(v):def; } catch(e){return def;} },
  set: (key, val) => { try { localStorage.setItem(APP_VERSION+"_"+key, JSON.stringify(val)); } catch(e){} }
};

function App() {
  const [tabIdx, setTabIdx]           = useState(0);
  const [ozetCats, setOzetCats]       = useState(()=>LS.get("ozetCats", INIT_OZET_CATS));
  const [manuelCats, setManuelCats]   = useState(()=>LS.get("manuelCats", INIT_MANUEL_CATS));
  const [odemeler, setOdemeler]       = useState(()=>LS.get("odemeler", INIT_ODEMELER));
  const [gelirKalemler, setGelirKalemler] = useState(()=>LS.get("gelirKalemler", [{id:uid(),label:"Maaş",amount:130000}]));
  const touchStart = useRef(null);

  // Her değişiklikte localStorage'a kaydet
  useEffect(()=>{ LS.set("ozetCats", ozetCats); }, [ozetCats]);
  useEffect(()=>{ LS.set("manuelCats", manuelCats); }, [manuelCats]);
  useEffect(()=>{ LS.set("odemeler", odemeler); }, [odemeler]);
  useEffect(()=>{ LS.set("gelirKalemler", gelirKalemler); }, [gelirKalemler]);

  let autoColorIdx = 0;
  const enrichedOzetCats = ozetCats.map(cat => {
    if (cat.key === "borc") {
      const auto = odemeler.filter(o=>o.kategori==="Kredi").map(o=>({id:"auto_"+o.id,label:o.label,amount:o.tutar,auto:true,autoColor:AUTO_COLORS[autoColorIdx++%AUTO_COLORS.length]}));
      return {...cat,items:[...cat.items.filter(it=>!it.auto),...auto]};
    }
    if (cat.key === "kredi") {
      // Kredi kartıyla ödenen kalemler otomatik eklenir
      const auto = odemeler.filter(o=>o.yontem==="Kredi Kartı").map(o=>({id:"auto_"+o.id,label:o.label+" (Kredi Kartı)",amount:o.tutar,auto:true,autoColor:YONTEM_COLORS["Kredi Kartı"]}));
      return {...cat,items:[...cat.items.filter(it=>!it.auto),...auto]};
    }
    return cat;
  });

  const onTouchStart = e => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd   = e => {
    if(touchStart.current===null)return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if(Math.abs(diff)>50) setTabIdx(i=>diff>0?Math.min(i+1,2):Math.max(i-1,0));
    touchStart.current=null;
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');
        @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
        *{box-sizing:border-box;margin:0;padding:0;}
        input::-webkit-inner-spin-button{-webkit-appearance:none;}
        select{-webkit-appearance:none;appearance:none;}
        ::-webkit-scrollbar{width:0;height:0;}
      `}</style>
      <div style={{minHeight:"100vh",background:"#F7F6F2",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
        <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
          style={{width:400,maxWidth:"100%",background:"white",borderRadius:28,overflow:"hidden",
            boxShadow:"0 4px 40px rgba(0,0,0,0.08)",position:"relative",minHeight:640,display:"flex",flexDirection:"column",userSelect:"none"}}>

          <div style={{padding:"22px 20px 0"}}>
            <div style={{fontSize:11,color:"#bbb",letterSpacing:1,textTransform:"uppercase"}}>Mart 2026</div>
            <div style={{fontSize:22,fontWeight:700,color:"#111",fontFamily:"'DM Serif Display',serif",marginTop:3}}>{TITLES[TABS[tabIdx].key]}</div>
          </div>

          <div style={{position:"absolute",top:22,right:20,display:"flex",gap:5}}>
            {TABS.map((_,i)=>(
              <div key={i} onClick={()=>setTabIdx(i)}
                style={{width:i===tabIdx?16:6,height:6,borderRadius:3,background:i===tabIdx?"#222":"#ddd",cursor:"pointer",transition:"all .3s"}}/>
            ))}
          </div>

          <div style={{flex:1,overflowY:"auto",paddingBottom:66}}>
            {tabIdx===0&&<OzetTab ozetCats={enrichedOzetCats} setOzetCats={setOzetCats}/>}
            {tabIdx===1&&<GiderlerTab manuelCats={manuelCats} setManuelCats={setManuelCats} odemeler={odemeler} gelirKalemler={gelirKalemler} setGelirKalemler={setGelirKalemler}/>}
            {tabIdx===2&&<OdemelerTab odemeler={odemeler} setOdemeler={setOdemeler}/>}
          </div>

          <div style={{position:"absolute",bottom:0,left:0,right:0,height:60,background:"white",borderTop:"1px solid #f0f0f0",display:"flex",alignItems:"center",justifyContent:"space-around"}}>
            {TABS.map((t,i)=>(
              <button key={t.key} onClick={()=>setTabIdx(i)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",
                  padding:"6px 20px",borderRadius:14,color:tabIdx===i?"#222":"#bbb",fontFamily:"'DM Sans',sans-serif",transition:"all .2s"}}>
                <span style={{fontSize:17,transition:"transform .2s",transform:tabIdx===i?"scale(1.2)":"scale(1)"}}>{t.icon}</span>
                <span style={{fontSize:10,fontWeight:tabIdx===i?600:400}}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
